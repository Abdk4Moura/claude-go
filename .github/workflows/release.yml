name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }} (${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/claude-go dist/${{ matrix.artifact }}
          (cd dist && sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    name: cut release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/claude-go-*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
